name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: pip-audit (fail on any vuln)
        # Mode "project_path" : pip-audit lit pyproject.toml directement et
        # audit uniquement les dependances tierces declarees. Pas besoin
        # d'installer le package local (qui n'est pas sur PyPI tant qu'en
        # alpha → faisait planter --strict avec "Dependency not found").
        run: pip-audit --strict ./

      - name: Build distribution
        run: |
          pip install build
          python -m build
