name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps + the package itself
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: pip-audit (fail on any vuln)
        run: pip-audit --strict

      - name: Build distribution
        run: |
          pip install build
          python -m build
